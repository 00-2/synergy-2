<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Простейший счетчик</title>
<!-- подключаем стили -->
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <!-- окно отображения результата -->
  <div class="counter-display" id="display">0</div>
  <!-- кнопки "минус" и "плюс" -->
  <div class="buttons">
    <button id="minusBtn">-</button>
    <button id="plusBtn">+</button>
  </div>
  <!-- сообщение при экстремальных значениях скрыто по умолчанию -->
  <div id="extremeMessage" class="hidden">вы достигли экстремального значения</div>
</div>
<!-- подключаем скрипт -->
<script src="script.js"></script>
</body>
</html>
